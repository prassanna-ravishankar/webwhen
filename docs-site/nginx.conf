server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cloudflare terminates TLS; listen 80 otherwise leaks into Location headers.
    absolute_redirect off;
    port_in_redirect off;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Generated from .vitepress/redirects.ts by scripts/build-nginx-redirects.mjs.
    include /etc/nginx/nginx-redirects.conf;

    # Non-trailing-slash is the canonical form site-wide (matches frontend).
    rewrite ^/(.+)/$ /$1 permanent;

    # .html is legacy; canonicalize to extensionless form. VitePress builds
    # clean URLs (cleanUrls: true) but on-disk .html files remain — try_files
    # below still resolves them after the rewrite.
    rewrite ^/(.+)\.html$ /$1 permanent;

    # Block crawlers on non-prod hosts; prod falls through to the static file.
    location = /robots.txt {
        if ($host ~* ^(staging|preview|dev|docs-staging)\.) {
            return 200 "User-agent: *\nDisallow: /\n";
        }
    }

    # Missing paths must 404 so Google can deindex cleanly (no SPA fallback).
    error_page 404 /404.html;
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't cache HTML files
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Disable access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
