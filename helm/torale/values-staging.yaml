# Staging values for Torale on GKE ClusterKit
# Deployed to staging.torale.ai for pre-production testing

domains:
  frontend: staging.torale.ai
  api: api-staging.torale.ai
  docs: docs-staging.torale.ai

# Clerk authentication (uses production Clerk app - same as production)
# Rotated 2026-05-03 alongside production for the webwhen.ai rebrand cutover.
clerk:
  publishableKey: pk_live_Y2xlcmsud2Vid2hlbi5haSQ

# PostHog analytics (staging project)
posthog:
  enabled: true
  apiKey: "phc_OFKCUKk0xOos42tBeoRUjmgKfp6xXqKb81tZQwxDJdc"
  apiHost: "https://eu.posthog.com"

image:
  tag: staging

# Staging resource sizing (minimal, no autoscaling)
api:
  replicaCount: 1
  autoscaling:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  replicaCount: 1
  autoscaling:
    enabled: false
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

agent:
  replicaCount: 1
  # Resources inherit from values.yaml (256Mi/512Mi). Composio SDK + MCP
  # client push the import-time footprint past the old 128Mi/256Mi staging
  # override — keep staging and prod on the same agent sizing to avoid
  # "worked on staging, broke prod" drift.

# Staging database (separate from production)
database:
  name: torale_staging

# Disable docs for staging
docs:
  enabled: false
