# Production values for Torale on GKE ClusterKit

domains:
  frontend: torale.ai
  api: api.torale.ai
  # webwhen.ai cutover (T-0, 2026-05-03):
  # webwhen routes now ship with the production chart (no soak overlay).
  # noindex flag is OFF (httproute.noindex: false) so webwhen.ai is
  # crawlable. The torale routes are flipped to 301 RequestRedirect via
  # the chart template's $isCutover branch.
  webwhen:
    frontend: webwhen.ai
    www: www.webwhen.ai
    api: api.webwhen.ai
    docs: docs.webwhen.ai

httproute:
  noindex: false  # cutover-day: webwhen routes are indexable
  cutover: true   # T-0: torale.ai routes serve 301 RequestRedirect to webwhen.ai

# Clerk authentication
# Rotated 2026-05-03 from torale.ai-primary key to webwhen.ai-primary key per
# the rebrand cutover (Clerk dashboard primary domain flipped). Old sessions
# invalidated; users re-authenticate post-rotation. See #246.
clerk:
  publishableKey: pk_live_Y2xlcmsud2Vid2hlbi5haSQ

# PostHog analytics (production project)
posthog:
  enabled: true
  apiKey: "phc_aBJidBfDmxU0jaAn6K1168Ob6sGDdOc9hVImLHCTCWJ"
  apiHost: "https://eu.posthog.com"

image:
  tag: latest  # Will be overridden by Cloud Build with commit SHA

# Production resource sizing (minimal for startup)
api:
  replicaCount: 1
  autoscaling:
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 90
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  replicaCount: 1
  autoscaling:
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 90
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 200m
      memory: 128Mi

agent:
  replicaCount: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
