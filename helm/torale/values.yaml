# Default values for torale
# This is a YAML-formatted file.

# Global settings
global:
  projectId: baldmaninc
  region: us-central1

# Domain configuration
domains:
  frontend: torale.ai
  api: api.torale.ai
  docs: docs.torale.ai

# Clerk authentication
clerk:
  publishableKey: pk_test_cGxlYXNhbnQtcHJpbWF0ZS04OC5jbGVyay5hY2NvdW50cy5kZXYk

# PostHog analytics configuration
posthog:
  # Project API keys are public-safe (like Clerk publishable keys)
  # Set per environment (values-production.yaml, values-staging.yaml)
  enabled: true
  apiKey: "phc_xsNwTnbLMEgpRZDLdhfALt9lnf0mVbVkmcQg9hlhZHi"  # Dev project
  apiHost: "https://eu.posthog.com"  # EU instance for GDPR compliance

# Image configuration
image:
  registry: gcr.io
  repository: baldmaninc
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

# API deployment
api:
  enabled: true
  replicaCount: 2

  image:
    name: torale-api

  # Cost optimization: Use Spot pods
  nodeSelector:
    cloud.google.com/gke-spot: "true"

  tolerations:
    - key: cloud.google.com/gke-spot
      operator: Equal
      value: "true"
      effect: NoSchedule

  # Right-size resources for cost optimization
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Health checks
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 5

  startupProbe:
    httpGet:
      path: /health
      port: 8000
    failureThreshold: 30
    periodSeconds: 5

  service:
    type: ClusterIP
    port: 80
    targetPort: 8000

  # Horizontal Pod Autoscaler
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Frontend deployment
frontend:
  enabled: true
  replicaCount: 2

  image:
    name: torale-frontend

  # Cost optimization: Use Spot pods
  nodeSelector:
    cloud.google.com/gke-spot: "true"

  tolerations:
    - key: cloud.google.com/gke-spot
      operator: Equal
      value: "true"
      effect: NoSchedule

  # Lightweight resources for nginx
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  service:
    type: ClusterIP
    port: 80
    targetPort: 80

  # Horizontal Pod Autoscaler
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Docs deployment
docs:
  enabled: true
  replicaCount: 2

  image:
    name: torale-docs

  # Cost optimization: Use Spot pods
  nodeSelector:
    cloud.google.com/gke-spot: "true"

  tolerations:
    - key: cloud.google.com/gke-spot
      operator: Equal
      value: "true"
      effect: NoSchedule

  # Lightweight resources for nginx
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 200m
      memory: 128Mi

  service:
    type: ClusterIP
    port: 80
    targetPort: 80

  # Horizontal Pod Autoscaler
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Agent deployments (dual-tier for paid fallback)
agents:
  - name: free
    secretKey: GEMINI_API_KEY_FREE
    replicaCount: 1
  - name: paid
    secretKey: GEMINI_API_KEY_PAID
    replicaCount: 1

# Shared agent configuration
agent:
  enabled: true
  image:
    name: torale-agent

  # Cost optimization: Use Spot pods
  nodeSelector:
    cloud.google.com/gke-spot: "true"

  tolerations:
    - key: cloud.google.com/gke-spot
      operator: Equal
      value: "true"
      effect: NoSchedule

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Database configuration (Cloud SQL)
database:
  # Cloud SQL instance connection name
  connectionName: "baldmaninc:us-central1:clusterkit-db"
  host: "127.0.0.1"  # Cloud SQL Proxy
  port: 5432
  name: torale
  user: torale
  # Password should be set in secrets

# Cloud SQL Proxy sidecar configuration
cloudsql:
  enabled: true
  image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.19.0
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# Platform capacity limit for beta
capacity:
  maxUsers: 100

# Novu notification configuration
novu:
  apiUrl: "https://eu.api.novu.co"
  workflowId: "torale-condition-met"
  verificationWorkflowId: "torale-email-verification"
  welcomeWorkflowId: "torale-task-welcome"
  applicationId: "1mO9V2spkNCO"  # Production app ID

# Gateway API HTTPRoute configuration (replaces Ingress)
httproute:
  enabled: true
  gatewayName: clusterkit-gateway
  # Inject `X-Robots-Tag: noindex, nofollow` on every webwhen route.
  # Used during the rebrand soak window (T-2d → T-0). Cutover-day diff =
  # remove the values-webwhen-soak.yaml overlay (or set this to false).
  # Has no effect when domains.webwhen is unset (no webwhen routes render).
  noindex: false
  # Inject `X-Robots-Tag: noindex, nofollow` on the torale-route frontend
  # catchall. Set true in values-staging.yaml so staging.torale.ai isn't
  # crawlable. Production sets httproute.cutover=true which 301-redirects
  # the torale routes entirely, so this flag has no effect there. See #280.
  stagingNoindex: false

# webwhen.ai parallel routing (rebrand cutover).
#
# When unset (default), the chart renders only the torale.ai routes. To
# enable webwhen routes, set domains.webwhen via an overlay
# (values-webwhen-soak.yaml during soak; bake into values-production.yaml /
# values-staging.yaml at cutover). The cert webwhen-ai-origin-cert covers
# all hostnames listed below; it's pre-attached to clusterkit-gateway.
#
# Production overlay shape:
#   domains:
#     webwhen:
#       frontend: webwhen.ai
#       www: www.webwhen.ai
#       api: api.webwhen.ai
#       docs: docs.webwhen.ai
#
# Staging overlay shape (no www, no docs):
#   domains:
#     webwhen:
#       frontend: staging.webwhen.ai
#       api: api-staging.webwhen.ai
#
# domains.webwhen: {}  # leave commented; overlays set this

# ConfigMap for non-sensitive configuration
config:
  # Will be populated from values

# Secrets are managed externally (not created by Helm)
# This ensures secrets are never accidentally committed to git and provides
# better separation between infrastructure and application deployment
secrets:
  # Always true - secrets must be created manually before deployment
  # Create secrets using: just k8s-secrets
  # Or manually with kubectl:
  #   kubectl create secret generic torale-secrets -n torale \
  #     --from-literal=GEMINI_API_KEY="..." \
  #     --from-literal=PERPLEXITY_API_KEY="..." \
  #     --from-literal=SECRET_KEY="..." \
  #     --from-literal=DB_PASSWORD="..." \
  #     --from-literal=CLERK_SECRET_KEY="..." \
  #     --from-literal=NOVU_SECRET_KEY="..." \
  #     --from-literal=MEM0_API_KEY="" \
  #     --from-literal=OPENAI_API_KEY="" \
  #     --from-literal=NOTIFICATION_API_KEY="" \
  #     --from-literal=POSTHOG_API_KEY="phc_..."
  external: true
  name: torale-secrets

# Service Account (for Workload Identity)
serviceAccount:
  create: true
  name: torale-sa
  annotations:
    iam.gke.io/gcp-service-account: cloudsql-proxy@baldmaninc.iam.gserviceaccount.com
