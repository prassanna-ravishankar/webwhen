{{- if .Values.frontend.enabled -}}
{{- /*
Live API hostname. Resolution order: live first (post-cutover), then legacy
(the rebrand-source). Both `dig` calls return "" when the path is missing,
so this stays safe even if either block is absent (e.g. post-#281-PR-2
staging has no legacy block).
*/ -}}
{{- $apiHost := coalesce (dig "live" "api" "" .Values.domains) (dig "legacy" "api" "" .Values.domains) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "torale.fullname" . }}-frontend-config
  labels:
    {{- include "torale.frontend.labels" . | nindent 4 }}
data:
  config.js: |
    // Runtime configuration injected by Kubernetes
    window.CONFIG = {
      apiUrl: 'https://{{ $apiHost }}',
      clerkPublishableKey: '{{ .Values.clerk.publishableKey }}',
      {{- if .Values.posthog.enabled }}
      posthogApiKey: '{{ .Values.posthog.apiKey }}',
      posthogHost: '{{ .Values.posthog.apiHost }}'
      {{- else }}
      posthogApiKey: undefined,
      posthogHost: undefined
      {{- end }}
    };
{{- end }}
