apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "torale.fullname" . }}-config
  labels:
    {{- include "torale.labels" . | nindent 4 }}
data:
  # Database configuration (non-sensitive)
  DB_HOST: {{ .Values.database.host | quote }}
  DB_PORT: {{ .Values.database.port | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
  DB_USER: {{ .Values.database.user | quote }}

  # Agent URLs (dual-tier for paid fallback)
  AGENT_URL_FREE: {{ printf "http://%s-agent-free" (include "torale.fullname" .) | quote }}
  AGENT_URL_PAID: {{ printf "http://%s-agent-paid" (include "torale.fullname" .) | quote }}
  # Keep AGENT_URL for backward compatibility
  AGENT_URL: {{ printf "http://%s-agent-free" (include "torale.fullname" .) | quote }}

  # API + frontend self-URLs (used for email links, OAuth callbacks, etc.).
  # Post-cutover (production), the live hosts are .Values.domains.live.*;
  # .Values.domains.legacy.* is pinned to torale.ai as the 301-redirect
  # source in httproute.yaml. On surfaces with no parallel-route setup
  # (staging, dev), domains.live is absent and the legacy keys ARE the
  # live hosts — the dig fallback below handles that.
  API_URL: {{ printf "https://%s" (default .Values.domains.legacy.api (dig "live" "api" "" .Values.domains)) | quote }}
  FRONTEND_URL: {{ printf "https://%s" (default .Values.domains.legacy.frontend (dig "live" "frontend" "" .Values.domains)) | quote }}

  # Platform capacity
  MAX_USERS: {{ .Values.capacity.maxUsers | quote }}

  # Novu configuration (non-sensitive)
  NOVU_API_URL: {{ .Values.novu.apiUrl | quote }}
  NOVU_WORKFLOW_ID: {{ .Values.novu.workflowId | quote }}
  NOVU_VERIFICATION_WORKFLOW_ID: {{ .Values.novu.verificationWorkflowId | quote }}
  NOVU_WELCOME_WORKFLOW_ID: {{ .Values.novu.welcomeWorkflowId | quote }}
  NOVU_APPLICATION_ID: {{ .Values.novu.applicationId | quote }}

  # PostHog configuration (non-sensitive)
  {{- if .Values.posthog.enabled }}
  POSTHOG_HOST: {{ .Values.posthog.apiHost | quote }}
  POSTHOG_ENABLED: "true"
  {{- else }}
  POSTHOG_ENABLED: "false"
  {{- end }}
