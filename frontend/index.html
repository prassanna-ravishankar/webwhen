<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brand/webwhen-mark-favicon.svg" />
    <!-- PNG favicon fallback regenerated separately; see milestone #9. -->
    <link rel="apple-touch-icon" href="/brand/webwhen-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title + description are set per-page via <DynamicMeta>. react-helmet-async
         only dedupes tags it rendered, so static fallbacks here would collide. -->
    <meta property="og:site_name" content="webwhen">
    <meta property="og:image" content="https://webwhen.ai/og-image.webp">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://webwhen.ai/og-image.webp">

    <!-- Warm up TLS to the API so Landing fetches are not gated on DNS+TLS. -->
    <link rel="preconnect" href="https://api.webwhen.ai" crossorigin>

    <!-- Preload the LCP-critical font (Instrument Sans powers the hero <h1>).
         font-display: swap means text paints in fallback first, then swaps when
         the woff2 arrives — preloading hides the swap moment and tightens LCP. -->
    <link rel="preload" href="/fonts/instrument-sans-latin.woff2" as="font" type="font/woff2" crossorigin>

    <!-- Load runtime config (deferred for better performance) -->
    <script src="/config.js" defer></script>

    <!--
      Organization JSON-LD is emitted by <OrganizationJsonLd /> at the React
      root so it routes through getOrigin() and bakes per-environment URLs
      during prerender (webwhen.ai in prod, PRERENDER_ORIGIN override in
      staging). See #282.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
