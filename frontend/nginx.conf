server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cloudflare terminates TLS; listen 80 otherwise leaks into Location headers.
    absolute_redirect off;
    port_in_redirect off;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Security headers via headers-more (NOT add_header).
    #
    # Stock nginx `add_header` at server scope is silently discarded the moment
    # a `location` block uses its own `add_header` — even when the parent
    # directive carries `always`. This was a long-running production gap (no
    # CSP / HSTS / Referrer-Policy reaching browsers on /, /index.html, or any
    # static asset) until #259 caught it. Fix: install the headers-more module
    # in the Dockerfile and use `more_set_headers`, which propagates through
    # location blocks regardless of what they do with `add_header`.
    #
    # CSP allowlist details:
    # - img-src + connect-src admit *.webwhen.ai (frontend → api).
    # - script-src + frame-src admit clerk.webwhen.ai (Clerk primary domain
    #   post-rebrand; the old clerk.torale.ai entry was retired once DNS
    #   settled — verified via agent-browser that the live site loads zero
    #   torale.ai hosts at runtime).
    # - script-src + frame-src admit challenges.cloudflare.com for Clerk's
    #   Bot Protection (Cloudflare Turnstile). The widget script + iframe
    #   both load from this origin; without it CAPTCHA fails to render and
    #   signup is blocked. Discovered post-cutover when user reported sign-up
    #   spinner stuck on iPhone.
    more_set_headers "X-Content-Type-Options: nosniff";
    more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
    more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
    more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' https://*.clerk.accounts.dev https://*.clerk.com https://clerk.webwhen.ai https://challenges.cloudflare.com https://static.cloudflareinsights.com https://eu.posthog.com https://eu.i.posthog.com https://eu-assets.i.posthog.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https://*.clerk.com https://*.webwhen.ai; connect-src 'self' https://*.webwhen.ai https://*.clerk.accounts.dev https://*.clerk.com https://api.clerk.com https://eu.posthog.com https://eu.i.posthog.com https://eu-assets.i.posthog.com; frame-src 'self' https://*.clerk.accounts.dev https://*.clerk.com https://clerk.webwhen.ai https://challenges.cloudflare.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self';";

    rewrite ^/(.+)/$ /$1 permanent;

    # Strip .html from external URLs so the canonical no-extension form is
    # the only reachable URL. Client request `/changelog.html` → 301 →
    # `/changelog`. Server-scope rewrite fires BEFORE location selection on
    # incoming requests; the `try_files $uri.html` candidate inside
    # `location /` is an internal rewrite that does NOT re-enter the rewrite
    # phase, so the prerendered HTML is still served correctly under the
    # clean URL.
    #
    # `/index.html` exact → 301 → `/`. SEO-audit V2 (B2): the previous
    # negative-lookahead guard left `/index.html` reachable as a 200,
    # creating a homepage duplicate in Google's index. Internal serving of
    # the SPA shell is unaffected: the `index index.html;` directive (above)
    # and the `try_files /index.html =404;` in @spa_shell are internal
    # nginx lookups that bypass the rewrite phase.
    #
    # See #328 (.html sub-paths), #329 (PR follow-up), #331 (B2).
    rewrite ^/index\.html$ / permanent;

    # General .html-strip — excludes `index.html` (handled above) and
    # `404.html` (served via `error_page 404 /404.html` below; the rewrite
    # phase would otherwise catch the internal redirect and 301 it to /404).
    # SEO audit V2 (B1).
    rewrite ^/(?!index\.html$|404\.html$)(.+)\.html$ /$1 permanent;

    # `/index` is the canonical-stripped form of `/index.html`; without an
    # explicit redirect, `try_files $uri.html` would resolve it to
    # dist/index.html and serve a 200 — another homepage duplicate. SEO
    # audit V2 (B1).
    rewrite ^/index$ / permanent;

    # /sitemap.xml and /robots.txt are routed to the backend by the Gateway
    # HTTPRoute (see helm/torale/templates/httproute.yaml). The backend serves
    # a sitemap index that points at /sitemap-static.xml (this nginx) and
    # /sitemap-dynamic.xml (backend).
    location = /sitemap-static.xml {
        default_type application/xml;
    }

    # SPA-only routes that have no prerendered HTML — auth flows, the watch
    # dashboard, public task pages, settings, etc. We allowlist them
    # explicitly so unknown paths fall through to the catchall (next
    # location) and return a real 404 instead of the home-page-canonical
    # SPA shell. SEO audit V2 (B1): the previous behaviour was a soft-404
    # avalanche where every typo URL became a homepage duplicate in
    # Google's index.
    #
    # Pattern shapes:
    #   /sign-in(/.*)?, /sign-up(/.*)?  — Clerk renders nested routes
    #   /settings(/.*)?                  — /settings, /settings/notifications, /settings/connectors
    #   /tasks/<id>                      — bare /tasks deliberately excluded; needs a UUID
    #   /waitlist, /explore, /welcome, /dashboard, /admin — single-segment routes
    #
    # Case-sensitive (`~`, not `~*`) so /Dashboard, /SETTINGS etc. do not
    # match — they instead fall through to the 404 path. That closes audit
    # finding I1 (case-variant duplicate content) as a side benefit.
    #
    # Source of truth: frontend/src/App.tsx <Route> declarations. Keep this
    # regex in sync when adding/removing SPA-only routes. Prerendered routes
    # (/, /changelog, /terms, /privacy, /compare/<slug>, /use-cases/<slug>,
    # /concepts/<slug>) are NOT listed here — they're served by the catchall
    # via try_files $uri.html.
    location ~ "^/(sign-in(/.*)?|sign-up(/.*)?|waitlist|explore|welcome|dashboard|admin|tasks/[^/]+|settings(/.*)?)$" {
        more_set_headers "Cache-Control: no-store, must-revalidate";
        try_files /index.html =404;
    }

    # Prerendered route HTML (everything in dist/<route>.html generated by
    # scripts/prerender.mjs) is content-deterministic per build and safe to
    # cache at the CF edge for short windows. Bounded TTL (no stale-while-
    # revalidate) keeps the deploy-staleness blast radius small — stale HTML
    # pointing at deleted hashed JS chunks would 404, so we cap at s-maxage.
    # 5 min ceiling: deploys take ~1-2 min, no CF purge required.
    #
    # Try $uri (literal file like /favicon.ico — rare, but possible since the
    # static-asset regex location below catches the common ones), then
    # $uri/index.html (resolves the bare `/` request to `/index.html` since
    # `try_files` bypasses the `index` directive), then $uri.html
    # (prerendered route). If none match, return a real 404 — nginx serves
    # dist/404.html via `error_page 404 /404.html` below. The 404 HTML is
    # the React NotFound shell with `noindex` meta and no canonical,
    # prerendered separately by scripts/prerender.mjs. SEO audit V2 (B1).
    location / {
        try_files $uri $uri/index.html $uri.html =404;
        more_set_headers "Cache-Control: public, max-age=60, s-maxage=300";
    }

    # Real 404s serve the prerendered NotFound shell with `noindex, nofollow`
    # and no canonical. `internal` prevents direct access to /404.html as a
    # 200 (which would itself create a duplicate-content issue). See B1.
    error_page 404 /404.html;
    location = /404.html {
        internal;
        more_set_headers "Cache-Control: no-store, must-revalidate";
    }

    # Don't cache runtime config. Use more_set_headers for consistency with
    # the security headers above; mixing add_header + more_set_headers in the
    # same location reintroduces the inheritance trap.
    #
    # Do NOT add `expires 0` here — nginx's `expires` directive emits its own
    # `Cache-Control: max-age=0` header that wins over more_set_headers
    # (processed later in the response-header phase). Cloudflare interprets
    # `max-age=0` as "cacheable but stale, revalidate" and holds edge cache,
    # which split the PoPs after the Clerk pub-key rotation 2026-05-03 and
    # broke sign-in for users hitting stale PoPs. more_set_headers' explicit
    # `no-store, must-revalidate` is sufficient on its own and instructs CF
    # to bypass cache entirely.
    location = /config.js {
        more_set_headers "Cache-Control: no-store, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        more_set_headers "Cache-Control: public, immutable";
    }

    # Don't cache index.html. Same expires-vs-more_set_headers conflict as
    # /config.js (see comment above) — let more_set_headers own Cache-Control.
    location = /index.html {
        more_set_headers "Cache-Control: no-store, must-revalidate";
    }

    # PWA manifest endpoints — return 404 explicitly. We don't ship a PWA, but
    # tooling (Lighthouse, Chrome devtools, some social card scrapers) probes
    # these paths. Without an exact-match location, nginx try_files falls back
    # to /index.html and returns 200 with the SPA shell HTML, which fools
    # PWA-detecting tools into thinking we have a manifest. Explicit 404 is
    # more honest. See #seo-verify.
    location = /manifest.webmanifest { return 404; }
    location = /site.webmanifest { return 404; }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        more_set_headers "Content-Type: text/plain";
    }
}
