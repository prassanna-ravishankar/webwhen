server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cloudflare terminates TLS; listen 80 otherwise leaks into Location headers.
    absolute_redirect off;
    port_in_redirect off;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP - Comprehensive protection against XSS, clickjacking, and other attacks
    # CSP allowlist additive during the webwhen.ai rebrand soak window: img-src
    # and connect-src admit *.webwhen.ai alongside *.torale.ai so the frontend
    # served on webwhen.ai can fetch backend, brand assets, and OG card from
    # either domain. script-src + frame-src keep clerk.torale.ai only — Clerk
    # stays hosted on accounts.torale.ai per positioning-decisions.md (no
    # clerk.webwhen.ai exists). Strip the *.torale.ai entries at cutover when
    # DNS flips; for now both coexist.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.clerk.accounts.dev https://*.clerk.com https://clerk.torale.ai https://static.cloudflareinsights.com https://eu.posthog.com https://eu.i.posthog.com https://eu-assets.i.posthog.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https://*.clerk.com https://*.torale.ai https://*.webwhen.ai; connect-src 'self' https://*.torale.ai https://*.webwhen.ai https://*.clerk.accounts.dev https://*.clerk.com https://api.clerk.com https://eu.posthog.com https://eu.i.posthog.com https://eu-assets.i.posthog.com; frame-src 'self' https://*.clerk.accounts.dev https://*.clerk.com https://clerk.torale.ai; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    rewrite ^/(.+)/$ /$1 permanent;

    # /sitemap.xml and /robots.txt are routed to the backend by the Gateway
    # HTTPRoute (see helm/torale/templates/httproute.yaml). The backend serves
    # a sitemap index that points at /sitemap-static.xml (this nginx) and
    # /sitemap-dynamic.xml (backend).
    location = /sitemap-static.xml {
        default_type application/xml;
    }

    location / {
        try_files $uri $uri.html /index.html;
    }

    # Don't cache runtime config
    location = /config.js {
        add_header Cache-Control "no-store, must-revalidate";
        expires 0;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        expires 0;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
