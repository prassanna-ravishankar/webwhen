server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cloudflare terminates TLS; listen 80 otherwise leaks into Location headers.
    absolute_redirect off;
    port_in_redirect off;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Security headers via headers-more (NOT add_header).
    #
    # Stock nginx `add_header` at server scope is silently discarded the moment
    # a `location` block uses its own `add_header` — even when the parent
    # directive carries `always`. This was a long-running production gap (no
    # CSP / HSTS / Referrer-Policy reaching browsers on /, /index.html, or any
    # static asset) until #259 caught it. Fix: install the headers-more module
    # in the Dockerfile and use `more_set_headers`, which propagates through
    # location blocks regardless of what they do with `add_header`.
    #
    # CSP allowlist details:
    # - img-src + connect-src admit *.webwhen.ai alongside *.torale.ai for the
    #   rebrand soak window (frontend served on webwhen.ai still fetches
    #   backend on api.torale.ai during soak; cutover-day strip removes the
    #   torale entries).
    # - script-src + frame-src admit clerk.webwhen.ai alongside clerk.torale.ai
    #   for the rebrand cutover (Clerk primary domain flipped 2026-05-03;
    #   old clerk.torale.ai may still serve briefly during DNS propagation).
    #   Strip clerk.torale.ai post-cutover when DNS settles.
    more_set_headers "X-Content-Type-Options: nosniff";
    more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
    more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
    more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' https://*.clerk.accounts.dev https://*.clerk.com https://clerk.torale.ai https://clerk.webwhen.ai https://static.cloudflareinsights.com https://eu.posthog.com https://eu.i.posthog.com https://eu-assets.i.posthog.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https://*.clerk.com https://*.torale.ai https://*.webwhen.ai; connect-src 'self' https://*.torale.ai https://*.webwhen.ai https://*.clerk.accounts.dev https://*.clerk.com https://api.clerk.com https://eu.posthog.com https://eu.i.posthog.com https://eu-assets.i.posthog.com; frame-src 'self' https://*.clerk.accounts.dev https://*.clerk.com https://clerk.torale.ai https://clerk.webwhen.ai; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self';";

    rewrite ^/(.+)/$ /$1 permanent;

    # /sitemap.xml and /robots.txt are routed to the backend by the Gateway
    # HTTPRoute (see helm/torale/templates/httproute.yaml). The backend serves
    # a sitemap index that points at /sitemap-static.xml (this nginx) and
    # /sitemap-dynamic.xml (backend).
    location = /sitemap-static.xml {
        default_type application/xml;
    }

    location / {
        try_files $uri $uri.html /index.html;
    }

    # Don't cache runtime config. Use more_set_headers for consistency with
    # the security headers above; mixing add_header + more_set_headers in the
    # same location reintroduces the inheritance trap.
    #
    # Do NOT add `expires 0` here — nginx's `expires` directive emits its own
    # `Cache-Control: max-age=0` header that wins over more_set_headers
    # (processed later in the response-header phase). Cloudflare interprets
    # `max-age=0` as "cacheable but stale, revalidate" and holds edge cache,
    # which split the PoPs after the Clerk pub-key rotation 2026-05-03 and
    # broke sign-in for users hitting stale PoPs. more_set_headers' explicit
    # `no-store, must-revalidate` is sufficient on its own and instructs CF
    # to bypass cache entirely.
    location = /config.js {
        more_set_headers "Cache-Control: no-store, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        more_set_headers "Cache-Control: public, immutable";
    }

    # Don't cache index.html. Same expires-vs-more_set_headers conflict as
    # /config.js (see comment above) — let more_set_headers own Cache-Control.
    location = /index.html {
        more_set_headers "Cache-Control: no-store, must-revalidate";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        more_set_headers "Content-Type: text/plain";
    }
}
