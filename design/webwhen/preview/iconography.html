<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>webwhen · Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--ww-canvas); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 1px; background: var(--ww-ink-6); border: 1px solid var(--ww-ink-6); border-radius: var(--ww-radius-md); overflow: hidden; }
  .cell { background: var(--ww-paper); padding: 18px 8px 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .cell svg { color: var(--ww-ink-2); width: 22px; height: 22px; }
  .name { font-family: var(--ww-font-mono); font-size: 10px; color: var(--ww-ink-4); }
  .note { font-family: var(--ww-font-mono); font-size: 10px; color: var(--ww-ink-4); margin: 0 0 10px; letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body class="ww-base">
<p class="note">lucide · 1.5 stroke · currentColor</p>
<div class="grid">
  <div class="cell"><i data-lucide="eye"></i><span class="name">eye</span></div>
  <div class="cell"><i data-lucide="bell"></i><span class="name">bell</span></div>
  <div class="cell"><i data-lucide="search"></i><span class="name">search</span></div>
  <div class="cell"><i data-lucide="clock"></i><span class="name">clock</span></div>
  <div class="cell"><i data-lucide="globe"></i><span class="name">globe</span></div>
  <div class="cell"><i data-lucide="zap"></i><span class="name">zap</span></div>
  <div class="cell"><i data-lucide="check"></i><span class="name">check</span></div>
  <div class="cell"><i data-lucide="arrow-right"></i><span class="name">arrow-right</span></div>
  <div class="cell"><i data-lucide="play"></i><span class="name">play</span></div>
  <div class="cell"><i data-lucide="pause"></i><span class="name">pause</span></div>
  <div class="cell"><i data-lucide="settings"></i><span class="name">settings</span></div>
  <div class="cell"><i data-lucide="filter"></i><span class="name">filter</span></div>
  <div class="cell"><i data-lucide="plus"></i><span class="name">plus</span></div>
  <div class="cell"><i data-lucide="trash-2"></i><span class="name">trash</span></div>
  <div class="cell"><i data-lucide="external-link"></i><span class="name">external</span></div>
  <div class="cell"><i data-lucide="more-horizontal"></i><span class="name">more</span></div>
</div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
