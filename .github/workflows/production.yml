# Production deployment workflow
# Simplified: Build → Deploy (no separate scan step)
# Uses Google Container Registry (gcr.io) for native GKE integration via Workload Identity
# Maintains GKE deployment via Helmfile

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: clusterkit
  GKE_REGION: us-central1
  IMAGE_TAG: ${{ github.sha }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate structure
        run: |
          echo "🔍 Validating project structure..."
          test -f backend/Dockerfile || (echo "❌ backend/Dockerfile missing" && exit 1)
          test -f frontend/Dockerfile || (echo "❌ frontend/Dockerfile missing" && exit 1)
          test -f docs-site/Dockerfile || (echo "❌ docs-site/Dockerfile missing" && exit 1)
          test -f torale-agent/Dockerfile || (echo "❌ torale-agent/Dockerfile missing" && exit 1)
          test -f helmfile.yaml.gotmpl || (echo "❌ helmfile.yaml.gotmpl missing" && exit 1)
          test -d helm/torale || (echo "❌ helm/torale missing" && exit 1)
          echo "✅ All files present"

  build:
    name: Build ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: validate

    permissions:
      contents: read
      id-token: write  # Required for GCP OIDC

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: .
            dockerfile: backend/Dockerfile
          - component: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
          - component: docs
            context: docs-site
            dockerfile: docs-site/Dockerfile
          - component: agent
            context: torale-agent
            dockerfile: torale-agent/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io

      # Frontend prerender bakes article-level JSON-LD into dist/changelog.html
      # using backend/static/changelog.json. The frontend image build context is
      # `frontend/` and cannot reach `../backend/`, so stage the fixture inside
      # the context first. See frontend/scripts/sync-changelog-fixture.mjs.
      - name: Stage changelog fixture for frontend prerender
        if: matrix.component == 'frontend'
        run: cp backend/static/changelog.json frontend/.changelog-fixture.json

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: false  # Prevent manifest list creation that breaks tagging with GHA cache
          tags: |
            gcr.io/${{ env.GCP_PROJECT_ID }}/torale-${{ matrix.component }}:${{ env.IMAGE_TAG }}
            gcr.io/${{ env.GCP_PROJECT_ID }}/torale-${{ matrix.component }}:latest
          cache-from: |
            type=gha
            type=registry,ref=gcr.io/${{ env.GCP_PROJECT_ID }}/torale-${{ matrix.component }}:latest
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      id-token: write  # Required for OIDC

    environment:
      name: production
      url: https://torale.ai

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}

      - name: Deploy via Helmfile
        uses: helmfile/helmfile-action@v2.0.5
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          helmfile-version: v0.162.0
          helm-version: v3.19.0
          helm-plugins: https://github.com/databus23/helm-diff@v3.9.4
          helmfile-args: sync --selector tier=app

      - name: Verify deployment
        run: |
          echo "✅ Verifying deployment..."
          kubectl rollout status deployment/torale-api -n torale --timeout=5m
          kubectl rollout status deployment/torale-frontend -n torale --timeout=5m
          kubectl rollout status deployment/torale-docs -n torale --timeout=5m
          kubectl rollout status deployment/torale-agent-free -n torale --timeout=5m
          kubectl rollout status deployment/torale-agent-paid -n torale --timeout=5m

      - name: Deployment summary
        run: |
          echo "🎉 Production deployment completed!"
          echo ""
          kubectl get pods -n torale -o wide
          echo ""
          kubectl get httproute -n torale
